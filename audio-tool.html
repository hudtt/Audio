<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أداة معالجة الصوت</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 8px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .upload-section {
            margin-bottom: 30px;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            border: 2px dashed #667eea;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }

        .file-input-wrapper:hover {
            background: #eef0ff;
            border-color: #764ba2;
        }

        .file-input-wrapper input {
            display: none;
        }

        .upload-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .upload-text {
            color: #333;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .upload-subtext {
            color: #999;
            font-size: 13px;
        }

        .file-name {
            background: #f0f4ff;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            color: #667eea;
            font-size: 13px;
            font-weight: 600;
            word-break: break-all;
        }

        .controls {
            margin-bottom: 30px;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .control-label label {
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        .control-value {
            color: #667eea;
            font-weight: 700;
            font-size: 13px;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #e0e0e0;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
        }

        input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
        }

        .buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-play {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-play:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-play:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-download {
            background: #f0f4ff;
            color: #667eea;
        }

        .btn-download:hover {
            background: #e8ecff;
        }

        .btn-download:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status {
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            text-align: center;
            font-weight: 600;
            margin-top: 15px;
        }

        .status.loading {
            background: #fff3cd;
            color: #856404;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
        }

        .waveform {
            width: 100%;
            height: 60px;
            background: #f5f5f5;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 13px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 25px;
            }

            .header h1 {
                font-size: 22px;
            }

            button {
                padding: 10px 12px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎵 معالج الصوت</h1>
            <p>حسّن صوتك بسهولة</p>
        </div>

        <div class="upload-section">
            <label class="file-input-wrapper" id="fileInputLabel">
                <input type="file" id="audioFile" accept=".m4a,.mp3,.wav,.ogg" />
                <div class="upload-icon">📁</div>
                <div class="upload-text">اختر ملف صوتي</div>
                <div class="upload-subtext">M4A, MP3, WAV أو OGG</div>
            </label>
            <div id="fileName" class="file-name" style="display: none;"></div>
        </div>

        <div id="controlsContainer" style="display: none;">
            <div class="controls">
                <div class="control-group">
                    <div class="control-label">
                        <label>عزل الضوضاء</label>
                        <span class="control-value" id="noiseValue">0%</span>
                    </div>
                    <input type="range" id="noiseSuppression" min="0" max="100" value="0" />
                </div>

                <div class="control-group">
                    <div class="control-label">
                        <label>الصدى</label>
                        <span class="control-value" id="reverbValue">0%</span>
                    </div>
                    <input type="range" id="reverb" min="0" max="100" value="0" />
                </div>

                <div class="control-group">
                    <div class="control-label">
                        <label>مستوى الصوت</label>
                        <span class="control-value" id="volumeValue">100%</span>
                    </div>
                    <input type="range" id="volume" min="0" max="200" value="100" />
                </div>
            </div>

            <div class="waveform" id="waveform">🎙️ اضغط لتشغيل</div>

            <div class="buttons">
                <button class="btn-play" id="playBtn" disabled>▶ تشغيل</button>
                <button class="btn-play" id="stopBtn" disabled>⏹ إيقاف</button>
                <button class="btn-download" id="downloadBtn" disabled>⬇ تحميل</button>
            </div>

            <div id="status"></div>
        </div>
    </div>

    <script>
        let audioContext;
        let audioBuffer;
        let sourceNode;
        let convolver;
        let gainNode;
        let analyser;
        let highPassFilter;
        let dryGain;
        let wetGain;
        let isPlaying = false;

        const fileInput = document.getElementById('audioFile');
        const fileNameDisplay = document.getElementById('fileName');
        const controlsContainer = document.getElementById('controlsContainer');
        const playBtn = document.getElementById('playBtn');
        const stopBtn = document.getElementById('stopBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const noiseSuppression = document.getElementById('noiseSuppression');
        const reverb = document.getElementById('reverb');
        const volume = document.getElementById('volume');
        const statusDiv = document.getElementById('status');
        const waveform = document.getElementById('waveform');

        // تهيئة Web Audio API
        function initAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                // High-pass filter لعزل الضوضاء
                highPassFilter = audioContext.createBiquadFilter();
                highPassFilter.type = 'highpass';
                highPassFilter.frequency.value = 100;
                highPassFilter.Q.value = 0.5;
                
                // Convolver للصدى
                convolver = audioContext.createConvolver();
                
                // Gain nodes
                gainNode = audioContext.createGain();
                dryGain = audioContext.createGain();
                wetGain = audioContext.createGain();
                analyser = audioContext.createAnalyser();
                
                // الاتصالات
                // المسار 1: صوت خام (dry)
                dryGain.connect(gainNode);
                
                // المسار 2: صوت معالج (wet) - صدى
                wetGain.connect(convolver);
                convolver.connect(gainNode);
                
                // المخرج
                highPassFilter.connect(dryGain);
                highPassFilter.connect(wetGain);
                gainNode.connect(analyser);
                analyser.connect(audioContext.destination);
                
                // قيم افتراضية
                dryGain.gain.value = 1;
                wetGain.gain.value = 0;
                
                // إنشاء impulse response للصدى
                createReverbImpulse();
            }
        }
        
        // إنشاء impulse response للصدى
        function createReverbImpulse() {
            const rate = audioContext.sampleRate;
            const length = rate * 2;
            const impulse = audioContext.createBuffer(2, length, rate);
            const left = impulse.getChannelData(0);
            const right = impulse.getChannelData(1);
            
            for (let i = 0; i < length; i++) {
                left[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 2);
                right[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 2);
            }
            convolver.buffer = impulse;
        }

        // تحميل الملف
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            fileNameDisplay.textContent = file.name;
            fileNameDisplay.style.display = 'block';
            statusDiv.textContent = '⏳ جاري تحميل الملف...';
            statusDiv.className = 'status loading';

            try {
                initAudioContext();
                const arrayBuffer = await file.arrayBuffer();
                audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                
                updateAudio();
                
                controlsContainer.style.display = 'block';
                playBtn.disabled = false;
                downloadBtn.disabled = false;
                statusDiv.textContent = '✅ تم التحميل بنجاح';
                statusDiv.className = 'status success';
                drawWaveform();
            } catch (error) {
                statusDiv.textContent = '❌ خطأ في تحميل الملف: ' + error.message;
                statusDiv.className = 'status error';
                console.error('Error:', error);
            }
        });

        // تشغيل الصوت
        playBtn.addEventListener('click', () => {
            if (isPlaying) return;
            
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }

            sourceNode = audioContext.createBufferSource();
            sourceNode.buffer = audioBuffer;
            
            // ربط المصدر بـ high-pass filter
            sourceNode.connect(highPassFilter);
            
            isPlaying = true;
            playBtn.disabled = true;
            stopBtn.disabled = false;
            
            sourceNode.onended = () => {
                isPlaying = false;
                playBtn.disabled = false;
                stopBtn.disabled = true;
            };
            
            sourceNode.start(0);
        });

        // إيقاف الصوت
        stopBtn.addEventListener('click', () => {
            if (sourceNode) {
                sourceNode.stop();
                isPlaying = false;
                playBtn.disabled = false;
                stopBtn.disabled = true;
            }
        });

        // تحديث المعاملات
        noiseSuppression.addEventListener('input', (e) => {
            document.getElementById('noiseValue').textContent = e.target.value + '%';
            updateAudio();
        });

        reverb.addEventListener('input', (e) => {
            document.getElementById('reverbValue').textContent = e.target.value + '%';
            updateAudio();
        });

        volume.addEventListener('input', (e) => {
            document.getElementById('volumeValue').textContent = e.target.value + '%';
            if (gainNode) {
                gainNode.gain.value = e.target.value / 100;
            }
        });

        function updateAudio() {
            if (!audioContext) return;
            
            // عزل الضوضاء - تحريك الـ high-pass filter
            const noiseAmount = noiseSuppression.value / 100;
            // كلما زاد العزل، كلما ارتفعت frequency الـ filter
            highPassFilter.frequency.value = 100 + (noiseAmount * 8000);
            
            // الصدى - مزج الصوت الرطب والجاف
            const reverbAmount = reverb.value / 100;
            dryGain.gain.value = 1 - (reverbAmount * 0.5);
            wetGain.gain.value = reverbAmount;
        }

        // رسم الموجة
        function drawWaveform() {
            const canvas = document.createElement('canvas');
            canvas.width = waveform.offsetWidth;
            canvas.height = 60;
            waveform.innerHTML = '';
            waveform.appendChild(canvas);

            const ctx = canvas.getContext('2d');
            const data = audioBuffer.getChannelData(0);
            const step = Math.ceil(data.length / canvas.width);

            ctx.fillStyle = '#667eea';
            for (let i = 0; i < canvas.width; i++) {
                let min = 1.0;
                let max = -1.0;
                for (let j = 0; j < step; j++) {
                    const datum = data[i * step + j];
                    if (datum < min) min = datum;
                    if (datum > max) max = datum;
                }
                const y = (1 + min) * canvas.height / 4;
                const height = (max - min) * canvas.height / 2;
                ctx.fillRect(i, y, 1, height);
            }
        }

        // تحميل الملف المعالج
        downloadBtn.addEventListener('click', async () => {
            if (!audioBuffer) return;

            statusDiv.textContent = '⏳ جاري معالجة الملف...';
            statusDiv.className = 'status loading';

            try {
                const offlineCtx = new OfflineAudioContext(
                    audioBuffer.numberOfChannels,
                    audioBuffer.length,
                    audioBuffer.sampleRate
                );

                // نفس البنية
                const offlineFilter = offlineCtx.createBiquadFilter();
                offlineFilter.type = 'highpass';
                offlineFilter.frequency.value = 100 + (noiseSuppression.value / 100 * 8000);
                
                const offlineConvolver = offlineCtx.createConvolver();
                const offlineGain = offlineCtx.createGain();
                const offlineDryGain = offlineCtx.createGain();
                const offlineWetGain = offlineCtx.createGain();
                
                // إنشاء impulse للصدى
                const rate = offlineCtx.sampleRate;
                const length = rate * 2;
                const impulse = offlineCtx.createBuffer(2, length, rate);
                const left = impulse.getChannelData(0);
                const right = impulse.getChannelData(1);
                
                for (let i = 0; i < length; i++) {
                    left[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 2);
                    right[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 2);
                }
                offlineConvolver.buffer = impulse;
                
                // الاتصالات
                offlineDryGain.connect(offlineGain);
                offlineWetGain.connect(offlineConvolver);
                offlineConvolver.connect(offlineGain);
                offlineGain.connect(offlineCtx.destination);
                offlineFilter.connect(offlineDryGain);
                offlineFilter.connect(offlineWetGain);
                
                // القيم
                const reverbAmount = reverb.value / 100;
                offlineDryGain.gain.value = 1 - (reverbAmount * 0.5);
                offlineWetGain.gain.value = reverbAmount;
                offlineGain.gain.value = volume.value / 100;
                
                const source = offlineCtx.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(offlineFilter);
                source.start(0);

                const renderedBuffer = await offlineCtx.startRendering();
                const wav = audioBufferToWav(renderedBuffer);
                const blob = new Blob([wav], { type: 'audio/wav' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'audio-edited.wav';
                a.click();
                URL.revokeObjectURL(url);

                statusDiv.textContent = '✅ تم التحميل بنجاح!';
                statusDiv.className = 'status success';
            } catch (error) {
                statusDiv.textContent = '❌ خطأ: ' + error.message;
                statusDiv.className = 'status error';
            }
        });

        // تحويل إلى WAV
        function audioBufferToWav(audioBuffer) {
            const numberOfChannels = audioBuffer.numberOfChannels;
            const sampleRate = audioBuffer.sampleRate;
            const format = 1;
            const bitDepth = 16;

            let offset = 0;
            let buffers = [];
            for (let i = 0; i < numberOfChannels; i++) {
                buffers.push(audioBuffer.getChannelData(i));
            }

            let result = new Float32Array(audioBuffer.length * numberOfChannels);
            if (numberOfChannels === 2) {
                for (let i = 0; i < audioBuffer.length; i++) {
                    result[i * 2] = buffers[0][i];
                    result[i * 2 + 1] = buffers[1][i];
                }
            } else {
                result = buffers[0];
            }

            const dataView = encodeWAV(result, sampleRate, numberOfChannels, bitDepth);
            return dataView;
        }

        function encodeWAV(samples, sampleRate, numChannels, bitDepth) {
            const byteRate = sampleRate * numChannels * bitDepth / 8;
            const blockAlign = numChannels * bitDepth / 8;
            const buffer = new ArrayBuffer(44 + samples.length * 2);
            const view = new DataView(buffer);

            const writeString = (offset, string) => {
                for (let i = 0; i < string.length; i++) {
                    view.setUint8(offset + i, string.charCodeAt(i));
                }
            };

            writeString(0, 'RIFF');
            view.setUint32(4, 36 + samples.length * 2, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, byteRate, true);
            view.setUint16(32, blockAlign, true);
            view.setUint16(34, bitDepth, true);
            writeString(36, 'data');
            view.setUint32(40, samples.length * 2, true);

            let index = 44;
            for (let i = 0; i < samples.length; i++) {
                view.setInt16(index, samples[i] < 0 ? samples[i] * 0x8000 : samples[i] * 0x7FFF, true);
                index += 2;
            }

            return view;
        }
    </script>
</body>
</html>
